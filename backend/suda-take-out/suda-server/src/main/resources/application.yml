server:
  port: 8080

spring:
  ai:
    openai:
      api-key: sk-b1c09989464b49f8ae74c10d0a3e8a61
      base-url: https://api.deepseek.com
      chat:
          options:
            model: deepseek-chat
            temperature: 0.7
            max-tokens: 2000

  profiles:
    active: dev
  main:
    allow-circular-references: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      driver-class-name: ${suda.datasource.driver-class-name}
      url: jdbc:mysql://${suda.datasource.host}:${suda.datasource.port}/${suda.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: ${suda.datasource.username}
      password: ${suda.datasource.password}
  redis:
    host: 127.0.0.1
    port: 6380
    password: 123456
    database: 1

# springdoc-openapi 配置
springdoc:
  api-docs:
    enabled: true

# knife4j 增强
knife4j:
  enable: true

mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.suda.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      suda:
        mapper: debug
        service: info
        controller: info

suda:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: kamten
    # 设置jwt过期时间：2小时
    admin-ttl: 7200000
    # 设置前端传递过来的令牌名称
    admin-token-name: token
    # 用户端jwt秘钥
    user-secret-key: itheima
    # 用户端jwt过期时间(2小时)
    user-ttl: 7200000
    # 用户端令牌名称
    user-token-name: authentication
  wechat:
    app-id: ${suda.wechat.app-id}
    secret: ${suda.wechat.secret}

    mchid: ${suda.wechat.mchid}
    mchSecret: ${suda.wechat.mchSecret}
    privateKeyFilePath: ${suda.wechat.privateKeyFilePath}
    apiV3Key: ${suda.wechat.apiV3Key}
    weChatPayCertFilePath: ${suda.wechat.weChatPayCertFilePath}
    notifyUrl: ${suda.wechat.notifyUrl}
    refundNotifyUrl: ${suda.wechat.refundNotifyUrl}
  shop:
    address: 广东省湛江市霞山区国贸大厦A105号
  baidu:
    ak: ${SUDA_BAIDU_AK}

langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com/v1
      api-key: YOUR_DEEPSEEK_API_KEY
      model-name: deepseek-chat
      timeout: 60000
    streaming-chat-model:
      base-url: https://api.deepseek.com/v1
      api-key: YOUR_DEEPSEEK_API_KEY
      model-name: deepseek-chat
      timeout: 60000
