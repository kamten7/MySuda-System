services:
  # ==================== MySQL 8.0 ====================
  mysql:
    image: mysql:8.0
    container_name: suda-mysql
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 20050904@Aa
      MYSQL_DATABASE: sky_take_out
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ==================== Redis 7 ====================
  redis:
    image: redis:7-alpine
    container_name: suda-redis
    ports:
      - "6380:6379"
    command: redis-server --requirepass 123456 --port 6379
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== MinIO (S3 兼容对象存储) ====================
  minio:
    image: minio/minio:latest
    container_name: suda-minio
    ports:
      - "9010:9000"   # S3 API
      - "9011:9001"   # Web Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== MinIO 初始化：自动创建 bucket ====================
  minio-init:
    image: minio/mc:latest
    container_name: suda-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/sky-take-out;
      echo '>>> MinIO bucket sky-take-out 创建完成';
      exit 0;
      "

volumes:
  mysql-data:
  redis-data:
  minio-data:
